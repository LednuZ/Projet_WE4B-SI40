<div class="avis-container">

  <div class="page-header">
    <h1>Mes avis</h1>
  </div>

  <div class="loading" *ngIf="loading"><p>Chargement...</p></div>

  <!-- Avis vendeurs -->
  <div *ngIf="!loading">
    <div class="empty" *ngIf="mesAvisVendeurs.length === 0">
      <p>Vous n'avez encore laissé aucun avis sur un vendeur.</p>
    </div>
    <div class="avis-list">
      <div class="avis-card" *ngFor="let a of mesAvisVendeurs">
        <div class="avis-header">
          <div>
            <span class="avis-cible">{{ a.vendeur_display || (a.vendeur_prenom + ' ' + a.vendeur_nom) }}</span>
            <app-star-rating [rating]="a.note" [editable]="false"></app-star-rating>
          </div>
          <span class="avis-date">{{ a.date_avis | date:'dd/MM/yyyy' }}</span>
        </div>
        <p class="avis-contenu" *ngIf="a.contenu">{{ a.contenu }}</p>
        <p class="avis-contenu vide" *ngIf="!a.contenu"><em>Sans commentaire</em></p>
        <button class="btn-supprimer" (click)="supprimerVendeur(a.id_avis_utilisateur)">Supprimer</button>
      </div>
    </div>
  </div>

</div>
