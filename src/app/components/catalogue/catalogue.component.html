<div class="catalogue-container">

  <!-- Header Section -->
  <div class="catalogue-header">
    <h1 class="title-with-count">
      Annonces
      <span class="badge-count" [class.loading-badge]="loading">
        <ng-container *ngIf="!loading">{{ annonces.length }}</ng-container>
        <span class="badge-spinner" *ngIf="loading"></span>
      </span>
    </h1>
    <div class="header-actions">
      <button class="btn-filter" [class.active]="showFilters" (click)="toggleFilters()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="filter-icon" viewBox="0 0 24 24">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        <span>{{ showFilters ? 'Masquer les filtres' : 'Filtrer' }}</span>
      </button>
      <select class="sort-select" [ngModel]="sort" (ngModelChange)="onSortChange($event)">
        <option value="recent">Plus récentes</option>
        <option value="price_asc">Prix croissant</option>
        <option value="price_desc">Prix décroissant</option>
        <option value="km_asc">Kilométrage croissant</option>
        <option value="rating_desc">Meilleure note vendeur</option>
      </select>
    </div>
  </div>

  <!-- Filters Panel -->
  <div class="filters-panel" *ngIf="showFilters">
    <div class="filters-grid">

      <div class="filter-group">
        <label for="filter-marque">Marque</label>
        <select id="filter-marque" [(ngModel)]="filters.marque_id" (ngModelChange)="onFilterChange()">
          <option value="">Toutes</option>
          <option *ngFor="let m of marques" [value]="m.id_marque">{{ m.nom }}</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-carburant">Motorisation</label>
        <select id="filter-carburant" [(ngModel)]="filters.carburant" (ngModelChange)="onFilterChange()">
          <option value="">Toutes</option>
          <option value="Essence">Essence</option>
          <option value="Diesel">Diesel</option>
          <option value="Hybride">Hybride</option>
          <option value="Électrique">Électrique</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-km-max">Kilométrage max</label>
        <input id="filter-km-max" type="number" [(ngModel)]="filters.km_max" (change)="onFilterChange()" placeholder="Ex: 100000">
      </div>

      <div class="filter-group-slider">
        <app-range-slider 
          label="Budget" 
          [min]="0" 
          [max]="150000" 
          [step]="1000" 
          unit="€"
          [(minValue)]="filters.prix_min" 
          [(maxValue)]="filters.prix_max" 
          (filterChange)="onFilterChange()"
        ></app-range-slider>
      </div>

      <div class="filter-group-slider">
        <app-range-slider 
          label="Année de circulation" 
          [min]="1990" 
          [max]="2026" 
          [step]="1" 
          [(minValue)]="filters.annee_min" 
          [(maxValue)]="filters.annee_max" 
          (filterChange)="onFilterChange()"
        ></app-range-slider>
      </div>

    </div>
    <div class="filters-actions">
      <button class="btn-reset" (click)="resetFilters()">Réinitialiser</button>
    </div>
  </div>



  <!-- Loading State -->
  <div class="loading" *ngIf="loading">
    <p>Chargement des annonces en cours...</p>
  </div>

  <!-- Listings Grid -->
  <div class="annonces-grid" *ngIf="!loading">
    <app-annonce-card *ngFor="let a of annonces"
                      [annonce]="a"
                      [isLoggedIn]="authService.isLoggedIn()"
                      [isFavori]="isFavori(a.id_annonce)"
                      (toggleFavori)="toggleFavori($event)">
    </app-annonce-card>
  </div>

  <!-- No Results Found -->
  <div class="no-results" *ngIf="!loading && annonces.length === 0">
    <p>Aucune annonce ne correspond à vos critères de recherche.</p>
    <button class="btn-reset" (click)="resetFilters()">Réinitialiser tous les filtres</button>
  </div>

</div>
