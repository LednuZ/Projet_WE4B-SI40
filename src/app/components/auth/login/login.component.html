<div class="auth-container">
  <div class="auth-card">

    <div class="auth-brand">
      <a routerLink="/"><img src="assets/automarket_logo.svg" alt="AutoMarket" class="auth-logo-img"></a>
    </div>

    <h2>Connexion</h2>
    <p class="auth-subtitle">Content de vous revoir</p>

    <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" formControlName="email" placeholder="jean@exemple.fr">
      </div>
      <div class="form-group">
        <label for="mdp">Mot de passe</label>
        <input type="password" id="mdp" formControlName="password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Connexion…' : 'Se connecter' }}
      </button>
    </form>

    <p class="auth-link">
      Pas encore de compte ? <a routerLink="/register">S'inscrire gratuitement</a>
    </p>
  </div>
</div>
