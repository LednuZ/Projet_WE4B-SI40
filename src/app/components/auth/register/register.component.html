<div class="auth-container">
  <div class="auth-card">
    <h2>Inscription</h2>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="nom">Nom</label>
        <input type="text" id="nom" formControlName="nom" placeholder="Votre nom">
      </div>

      <div class="form-group">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" formControlName="prenom" placeholder="Votre prénom">
      </div>
        <div class="form-group">
            <label for="role">Vous êtes</label>
            <select id="role" formControlName="role">
            <option value="particulier">Particulier</option>
            <option value="entreprise">Entreprise</option>
            </select>
        </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" placeholder="Votre email">
      </div>
        <div class="form-group">
            <label for="mdp">Mot de passe</label>
            <input type="password" id="mdp" formControlName="password" placeholder="••••••">
        </div>
        <div class="form-group">
            <label for="confirmMdp">Confirmer le mot de passe</label>
            <input type="password" id="confirmMdp" formControlName="confirmPassword" placeholder="••••••">
        </div>
        <button type="submit" [disabled]="registerForm.invalid || loading">
            {{ loading ? 'Inscription...' : "S'inscrire" }}
        </button>
    </form>
    <p class="auth-link">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
