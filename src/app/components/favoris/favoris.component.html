<div class="favoris-container">

  <div class="page-header">
    <h1>Mes favoris</h1>
    <span class="count" *ngIf="!loading">{{ favoris.length }} annonce{{ favoris.length > 1 ? 's' : '' }}</span>
  </div>

  <div class="loading" *ngIf="loading">
    <p>Chargement de vos favoris...</p>
  </div>

  <div class="empty" *ngIf="!loading && favoris.length === 0">
    <div class="empty-icon">♡</div>
    <p>Vous n'avez pas encore de favoris.</p>
    <a routerLink="/annonces" class="btn-browse">Parcourir les annonces</a>
  </div>

  <div class="annonces-grid" *ngIf="!loading && favoris.length > 0">
    <app-annonce-card *ngFor="let f of favoris"
                      [annonce]="f"
                      [isLoggedIn]="true"
                      [isFavori]="true"
                      (toggleFavori)="retirer($event)">
    </app-annonce-card>
  </div>

</div>
