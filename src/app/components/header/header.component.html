<header class="header-container">
  <nav class="navbar shadow-sm">
    <div class="nav-content">
      
      <!-- Logo only -->
      <a routerLink="/" class="header-logo-link">
        <img src="assets/automarket_logo.svg" alt="AutoMarket" class="header-logo">
      </a>
      
      <!-- Main Navigation Links -->
      <ul class="nav-menu">
        <li class="nav-item-li">
          <a class="nav-link-custom" routerLink="/annonces">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/>
              <circle cx="7" cy="17" r="2"/>
              <path d="M9 17h6"/>
              <circle cx="17" cy="17" r="2"/>
            </svg>
            <span>Annonces</span>
          </a>
        </li>
        <li class="nav-item-li">
          <a class="nav-link-custom sell-button" routerLink="/annonces/new">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            <span>Vendre Ma Voiture</span>
          </a>
        </li>
      </ul>
      
      <!-- Right Side / Account & Authentication Links -->
      <ul class="nav-menu ms-auto align-items-center">
        <!-- If Not Logged In -->
        <ng-container *ngIf="!authService.isLoggedIn()">
          <li class="nav-item-li">
            <a class="nav-link-custom auth-btn login-btn" routerLink="/login">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
              <span>Se connecter</span>
            </a>
          </li>
          <li class="nav-item-li">
            <a class="nav-link-custom auth-btn register-btn" routerLink="/register">
              <svg class="nav-icon text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="16" y1="11" x2="22" y2="11"/>
              </svg>
              <span>S'inscrire</span>
            </a>
          </li>
        </ng-container>
        
        <!-- If Logged In -->
        <ng-container *ngIf="authService.isLoggedIn()">
          <!-- Espace Pro (Enterprise) -->
          <li class="nav-item-li" *ngIf="authService.getRole() === 'entreprise'">
            <a routerLink="/pro" class="admin-link-custom pro-badge" title="Espace Pro">
              <svg class="nav-icon animate-pulse" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
              </svg>
              <span>Espace Pro</span>
            </a>
          </li>
          
          <!-- Espace Admin -->
          <li class="nav-item-li" *ngIf="authService.getRole() === 'admin'">
            <a routerLink="/admin" class="admin-link-custom admin-badge" title="Dashboard Admin">
              <svg class="nav-icon animate-spin-slow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
              <span>Admin</span>
            </a>
          </li>
          
          <!-- Mes annonces -->
          <li class="nav-item-li">
            <a class="nav-link-custom" routerLink="/mes-annonces">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
              <span>Mes annonces</span>
            </a>
          </li>
          
          <!-- Favoris -->
          <li class="nav-item-li">
            <a routerLink="/favoris" class="icon-btn-custom" title="Mes favoris">
              <svg class="icon-svg-custom" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </a>
          </li>
          
          <!-- Messagerie -->
          <li class="nav-item-li nav-msg-custom">
            <a routerLink="/messagerie" class="icon-btn-custom" title="Messagerie">
              <svg class="icon-svg-custom" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <polyline points="2,4 12,13 22,4"/>
              </svg>
              <span class="badge-custom" *ngIf="nonLus > 0">{{ nonLus > 9 ? '9+' : nonLus }}</span>
            </a>
          </li>
          
          <!-- Mon Profil -->
          <li class="nav-item-li">
            <a routerLink="/profil" class="icon-btn-custom" title="Mon profil">
              <svg class="icon-svg-custom" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </a>
          </li>
          
          <!-- Logout -->
          <li class="nav-item-li">
            <a class="nav-link-custom logout-btn" role="button" (click)="logout()">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              <span>Se déconnecter</span>
            </a>
          </li>
        </ng-container>
      </ul>
      
    </div>
  </nav>
</header>
