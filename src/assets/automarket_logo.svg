<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AutoMarket logo</title>
  <desc>Logo AutoMarket — Showroom Digital, bleu marine et orange</desc>

  <!-- Icon: dark navy circle -->
  <circle cx="178" cy="100" r="50" fill="#0d1b35"/>

  <!-- Orange arc (speedometer style) -->
  <path d="M 133 135 A 55 55 0 1 1 218 72" fill="none" stroke="#c2670c" stroke-width="5" stroke-linecap="round"/>

  <!-- "A" monogram -->
  <text x="178" y="119" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="54" font-weight="900" fill="white">A</text>

  <!-- Small orange dot accent -->
  <circle cx="215" cy="133" r="5" fill="#c2670c"/>

  <!-- Split wordmark -->
  <text x="244" y="116" font-family="'Segoe UI', sans-serif" font-size="58" font-weight="700" fill="#1a2744">Auto</text>
  <text x="378" y="116" font-family="'Segoe UI', sans-serif" font-size="58" font-weight="700" fill="#c2670c">Market</text>

  <!-- Underline accent bar -->
  <rect x="244" y="124" width="130" height="3.5" rx="1.5" fill="#0d1b35" opacity="0.15"/>
  <rect x="378" y="124" width="175" height="3.5" rx="1.5" fill="#c2670c" opacity="0.35"/>

  <!-- Subtitle -->
  <text x="246" y="144" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="400" fill="#c2670c">SHOWROOM DIGITAL</text>
</svg>
